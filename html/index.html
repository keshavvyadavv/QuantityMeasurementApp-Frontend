<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Online Book Shopping</title>
    <link rel="stylesheet" href="../style/main.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>

<div class="wrapper">

    <!-- Left Panel -->
    <div class="left-panel">
        <div class="illustration-circl">
            <img  class="illustration-circle" src="../assest/image/shopingimg.png" alt="shopping image" >

        </div>
        <p class="brand-name">ONLINE BOOK SHOPPING</p>
    </div>

    <!-- Right Panel (Auth Form) -->
    <div class="right-panel">
        <!-- Tab Switcher -->
        <div class="tabs">
            <button class="tab-btn" id="loginTab" onclick="switchTab('login')">LOGIN</button>
            <button class="tab-btn active" id="signupTab" onclick="switchTab('signup')">SIGNUP</button>
        </div>

        <!-- Login Form -->
        <div class="form-section" id="loginForm">
            <div class="field-group">
                <label for="loginEmail">Email Id</label>
                <input type="email" id="loginEmail" placeholder="" />
                <span class="field-error" id="loginEmailError"></span>
            </div>
            <div class="field-group">
                <label for="loginPassword">Password</label>
                <div class="password-wrap">
                    <input type="password" id="loginPassword" placeholder="" />
                    <button class="toggle-pw" onclick="togglePassword('loginPassword', this)" aria-label="Toggle password visibility">
                        <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
                <span class="field-error" id="loginPasswordError"></span>
            </div>
            <button class="submit-btn" onclick="handleLogin()">Login</button>
            <p class="switch-text">Don't have an account? <a href="#" onclick="switchTab('signup')">Sign up</a></p>
        </div>

        <!-- Signup Form -->
        <div class="form-section" id="signupForm">
            <div class="field-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="" />
                <span class="field-error" id="fullNameError"></span>
            </div>
            <div class="field-group">
                <label for="emailId">Email Id</label>
                <input type="email" id="emailId" placeholder="" />
                <span class="field-error" id="emailIdError"></span>
            </div>
            <div class="field-group">
                <label for="password">Password</label>
                <div class="password-wrap">
                    <input type="password" id="password" placeholder="" />
                    <button class="toggle-pw" onclick="togglePassword('password', this)" aria-label="Toggle password visibility">
                        <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
                <span class="field-error" id="passwordError"></span>
            </div>
            <div class="field-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="password-wrap">
                    <input type="password" id="confirmPassword" placeholder="" />
                    <button class="toggle-pw" onclick="togglePassword('confirmPassword', this)" aria-label="Toggle password visibility">
                        <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
                <span class="field-error" id="confirmPasswordError"></span>
            </div>
            <div class="field-group">
                <label for="mobile">Mobile Number</label>
                <input type="tel" id="mobile" placeholder="" />
                <span class="field-error" id="mobileError"></span>
            </div>
            <button class="submit-btn" onclick="handleSignup()">Signup</button>
            <p class="switch-text">Already have an account? <a href="#" onclick="switchTab('login')">Login</a></p>
        </div>

    </div>
</div>

<!-- Toast Notification -->
<div class="toast" id="toast"></div>

<script src="../js/validation.js"></script>
<script src="../js/toast.js"></script>
<script src="../js/tabs.js"></script>
<script src="../js/toggle.js"></script>
<script src="../js/signup.js"></script>
<script src="../js/login.js"></script>
<script src="../js/main.js"></script>

</body>
</html>
